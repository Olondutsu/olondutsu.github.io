<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Moderne</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .carousel-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
    }

    .carousel {
      display: flex;
      transition: transform 0.5s ease;
    }

    .card {
      min-width: 70%;
      margin: 0 5%;
      background: #1c1c1c;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transform: scale(0.85);
      opacity: 0.5;
      transition: all 0.4s ease;
    }

    .card.active {
      transform: scale(1);
      opacity: 1;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .links a {
      display: block;
      color: #4da6ff;
      text-decoration: none;
      margin-top: 5px;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      cursor: pointer;
      padding: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      z-index: 10;
      user-select: none;
    }

    .nav:hover {
      background: rgba(255,255,255,0.2);
    }

    .left { left: 10px; }
    .right { right: 10px; }
  </style>
</head>
<body>

<div class="carousel-wrapper">
  <div class="nav left" onclick="move(-1)">&#10094;</div>
  <div class="nav right" onclick="move(1)">&#10095;</div>
  <div class="carousel" id="carousel"></div>
</div>

<script>
const data = [
  {
    title: "Lac d'Oule",
    image: "https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg",
    lat: 48.8584,
    lng: 2.2945,
    wiki: "https://fr.wikipedia.org/wiki/Tour_Eiffel"
  },
  {
    title: "Lac de Vassivière",
    image: "https://commons.wikimedia.org/wiki/File:Lac_de_l%27oule1.JPG#/media/Fichier:Lac_de_l'oule1.JPG",
    lat: 41.8902,
    lng: 12.4922,
    wiki: "https://fr.wikipedia.org/wiki/Lac_de_l%27Oule"
  },
  {
    title: "Lac de Pises",
    image: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Statue_of_Liberty_7.jpg",
    lat: 40.6892,
    lng: -74.0445,
    wiki: "https://fr.wikipedia.org/wiki/Statue_de_la_Libert%C3%A9"
  },
  {
    title: "Lac de Chalain",
    image: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Statue_of_Liberty_7.jpg",
    lat: 40.6892,
    lng: -74.0445,
    wiki: "https://fr.wikipedia.org/wiki/Statue_de_la_Libert%C3%A9"
  },
  {
    title: "Lac de Saint-Point",
    image: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Statue_of_Liberty_7.jpg",
    lat: 40.6892,
    lng: -74.0445,
    wiki: "https://fr.wikipedia.org/wiki/Statue_de_la_Libert%C3%A9"
  }
];

const carousel = document.getElementById("carousel");
let index = 0;

function createCard(item, i) {
  const card = document.createElement("div");
  card.className = "card";
  if (i === index) card.classList.add("active");

  card.innerHTML = `
    <img src="${item.image}" alt="${item.title}">
    <div class="card-content">
      <h3>${item.title}</h3>
      <div class="links">
        <a href="https://www.google.com/maps?q=${item.lat},${item.lng}" target="_blank">Google Maps</a>
        <a href="https://earth.google.com/web/@${item.lat},${item.lng}" target="_blank">Google Earth</a>
        <a href="${item.wiki}" target="_blank">Wikipedia</a>
      </div>
    </div>
  `;

  return card;
}

function render() {
  carousel.innerHTML = "";
  data.forEach((item, i) => {
    const card = createCard(item, i);
    carousel.appendChild(card);
  });

  const offset = index * (carousel.offsetWidth * 0.8);
  carousel.style.transform = `translateX(-${offset}px)`;
}

function move(direction) {
  index += direction;

  if (index < 0) index = 0;
  if (index > data.length - 1) index = data.length - 1;

  render();
}

render();
</script>

</body>
</html>

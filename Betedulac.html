<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Lacs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .carousel-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
    }

    .carousel {
      display: flex;
      transition: transform 0.5s ease;
    }

    .card {
      min-width: 70%;
      margin: 0 5%;
      background: #1c1c1c;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transform: scale(0.85);
      opacity: 0.5;
      transition: all 0.4s ease;
    }

    .card.active {
      transform: scale(1);
      opacity: 1;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .links a {
      display: inline-block;
      margin-right: 10px;
      font-size: 20px;
      text-decoration: none;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      cursor: pointer;
      padding: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      z-index: 10;
    }

    .left { left: 10px; }
    .right { right: 10px; }
  </style>
</head>
<body>

<div class="carousel-wrapper">
  <div class="nav left" onclick="move(-1)">❮</div>
  <div class="nav right" onclick="move(1)">❯</div>
  <div class="carousel" id="carousel"></div>
</div>

<script>
const data = [
  {
    title: "Lac d'Oule",
    image: "https://upload.wikimedia.org/wikipedia/commons/3/3c/Lac_de_l%27Oule_%28Hautes-Pyr%C3%A9n%C3%A9es%29.jpg",
    lat: 42.819,
    lng: 0.181,
    wiki: "https://fr.wikipedia.org/wiki/Lac_de_l%27Oule"
  },
  {
    title: "Lac de Vassivière",
    image: "https://upload.wikimedia.org/wikipedia/commons/5/5c/Lac_de_Vassiviere.jpg",
    lat: 45.7925,
    lng: 1.8861,
    wiki: "https://fr.wikipedia.org/wiki/Lac_de_Vassivi%C3%A8re"
  },
  {
    title: "Lac des Pises",
    image: "https://upload.wikimedia.org/wikipedia/commons/0/0c/Lac_des_Pises.jpg",
    lat: 44.167,
    lng: 3.5,
    wiki: "https://fr.wikipedia.org/wiki/Lac_des_Pises"
  },
  {
    title: "Lac de Chalain",
    image: "https://upload.wikimedia.org/wikipedia/commons/2/2c/Lac_de_Chalain.jpg",
    lat: 46.667,
    lng: 5.78,
    wiki: "https://fr.wikipedia.org/wiki/Lac_de_Chalain"
  },
  {
    title: "Lac de Saint-Point",
    image: "https://upload.wikimedia.org/wikipedia/commons/9/9e/Lac_de_Saint-Point.jpg",
    lat: 46.82,
    lng: 6.33,
    wiki: "https://fr.wikipedia.org/wiki/Lac_de_Saint-Point"
  }
];

const carousel = document.getElementById("carousel");
let index = 0;

function createCard(item, i) {
  const card = document.createElement("div");
  card.className = "card";
  if (i === index) card.classList.add("active");

  card.innerHTML = `
    <img src="${item.image}" alt="${item.title}">
    <div class="card-content">
      <h3>${item.title}</h3>
      <div class="links">
        <a href="https://www.google.com/maps?q=${item.lat},${item.lng}" target="_blank">📍</a>
        <a href="https://earth.google.com/web/@${item.lat},${item.lng}" target="_blank">🌍</a>
        <a href="${item.wiki}" target="_blank">📚</a>
        <a href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(item.title)}" target="_blank">🖼️</a>
      </div>
    </div>
  `;

  return card;
}

function render() {
  carousel.innerHTML = "";
  data.forEach((item, i) => {
    const card = createCard(item, i);
    carousel.appendChild(card);
  });

  const offset = index * (carousel.offsetWidth * 0.8);
  carousel.style.transform = `translateX(-${offset}px)`;
}

function move(direction) {
  index += direction;
  if (index < 0) index = 0;
  if (index > data.length - 1) index = data.length - 1;
  render();
}

render();
</script>

</body>
</html>

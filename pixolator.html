<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  color: #eee;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* TOP BAR */
#top {
  height: 44px;
  background: #222;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px;
  z-index: 5;
}

/* TOOLBOX */
#tools {
  position: fixed;
  left: 8px;
  top: 60px;
  background: #222;
  border: 1px solid #555;
  border-radius: 10px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

button {
  background: #333;
  color: #eee;
  border: 1px solid #555;
  padding: 6px;
}

button.active {
  background: #666;
}

/* CANVAS */
#canvasContainer {
  position: absolute;
  top: 44px;
  bottom: 60px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: auto;
  z-index: 1;
}

canvas {
  background: #fff;
  image-rendering: pixelated;
  touch-action: none;
  pointer-events: auto;
}

/* PALETTE */
#palette {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  z-index: 5;
}

.color {
  width: 32px;
  height: 32px;
  border: 2px solid #000;
}

.color.active {
  border-color: #fff;
}
</style>
</head>

<body>

<div id="top">
  <button id="newBtn">New</button>
  <button id="importBtn">Import</button>
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
  <button id="exportBtn">Export</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="line">📏</button>
  <button data-tool="fill">🪣</button>
  <button id="mirrorXBtn">↔️</button>
  <button id="mirrorYBtn">↕️</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
</div>

<div id="canvasContainer">
  <canvas id="canvas"></canvas>
</div>

<div id="palette"></div>

<script>
/* ===== CORE ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W = 16, H = 16;
let pixelSize = 24;
let bgColor = "#ffffff";

let pixels = new Array(W*H).fill("#ffffff");
let currentColor = "#000000";

let tool = "pencil";
let mirrorXEnabled = false;
let mirrorYEnabled = false;

let undoStack=[], redoStack=[], stroke=null;
let drawing=false, start=null;

/* ===== INIT ===== */
function resize() {
  canvas.width = W * pixelSize;
  canvas.height = H * pixelSize;
  render();
}

/* ===== RENDER ===== */
function render(preview=null){
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<H;y++)
    for(let x=0;x<W;x++){
      ctx.fillStyle=pixels[y*W+x];
      ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
    }

  if(preview) preview();
}

/* ===== DRAW ===== */
function canDraw(x,y){
  if(mirrorXEnabled && x>=Math.floor(W/2)) return false;
  if(mirrorYEnabled && y>=Math.floor(H/2)) return false;
  return true;
}

function applyPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  if(!canDraw(x,y)) return;

  const i=y*W+x;
  if(pixels[i]===currentColor) return;

  stroke.set(i,pixels[i]);
  pixels[i]=currentColor;

  if(mirrorXEnabled) pixels[y*W+(W-1-x)] = currentColor;
  if(mirrorYEnabled) pixels[(H-1-y)*W+x] = currentColor;
  if(mirrorXEnabled && mirrorYEnabled)
    pixels[(H-1-y)*W+(W-1-x)] = currentColor;
}

/* ===== FILL ===== */
function floodFill(x,y,target){
  if(target===currentColor) return;
  const stack=[[x,y]];
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cy<0||cx>=W||cy>=H) continue;
    const i=cy*W+cx;
    if(pixels[i]!==target) continue;
    applyPixel(cx,cy);
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

/* ===== INPUT ===== */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

canvas.onpointerdown=e=>{
  drawing=true;
  stroke=new Map();
  start=pos(e);
  if(tool==="pencil") applyPixel(start.x,start.y);
  if(tool==="fill") floodFill(start.x,start.y,pixels[start.y*W+start.x]);
  render();
};

canvas.onpointermove=e=>{
  if(!drawing) return;
  const p=pos(e);
  if(tool==="pencil") applyPixel(p.x,p.y);
  render();
};

window.onpointerup=()=>{
  if(!drawing) return;
  drawing=false;
  if(stroke.size){
    undoStack.push(stroke);
    redoStack.length=0;
  }
  render();
};

/* ===== UI ===== */
document.querySelectorAll("#tools button[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("#tools button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});

mirrorXBtn.onclick=()=>{
  mirrorXEnabled=!mirrorXEnabled;
  mirrorXBtn.classList.toggle("active",mirrorXEnabled);
};
mirrorYBtn.onclick=()=>{
  mirrorYEnabled=!mirrorYEnabled;
  mirrorYBtn.classList.toggle("active",mirrorYEnabled);
};

zoomIn.onclick=()=>{pixelSize+=4;resize();};
zoomOut.onclick=()=>{pixelSize=Math.max(4,pixelSize-4);resize();};

undoBtn.onclick=()=>{
  const s=undoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  redoStack.push(r); render();
};

redoBtn.onclick=()=>{
  const s=redoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  undoStack.push(r); render();
};

newBtn.onclick=()=>{
  pixels=new Array(W*H).fill("#ffffff");
  undoStack=[]; redoStack=[];
  render();
};

exportBtn.onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixolator.png";
  a.click();
};

/* ===== PALETTE ===== */
const palette=document.getElementById("palette");
["#000","#fff","#f00","#0f0","#00f","#ff0","#f0f","#0ff"].forEach((c,i)=>{
  const d=document.createElement("div");
  d.className="color";
  d.style.background=c;
  if(i===0)d.classList.add("active");
  d.onclick=()=>{
    document.querySelectorAll(".color").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    currentColor=c;
  };
  palette.appendChild(d);
});

/* START */
resize();
render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Pix-o-lator</title>

<style>
body{
  margin:0;
  background:#1a1a1a;
  color:#eee;
  font-family:sans-serif;
  height:100vh;
  overflow:hidden;
}

/* TOP BAR */
#top{
  height:44px;
  background:#222;
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px;
}

button{
  background:#333;
  color:#eee;
  border:1px solid #555;
  padding:6px;
}
button.active{background:#666;}

/* TOOLBOX */
#tools{
  position:fixed;
  left:8px;
  top:60px;
  background:#222;
  border:1px solid #555;
  border-radius:10px;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:10;
}

/* CANVAS */
#canvasContainer{
  position:absolute;
  top:44px;
  bottom:60px;
  left:0;
  right:0;
  overflow:hidden;
  background:#111;
}

#stage{
  transform-origin:0 0;
  touch-action:none;
}

canvas{
  background:#fff;
  image-rendering:pixelated;
}

/* PALETTE */
#palette{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.color{
  width:32px;
  height:32px;
  border:2px solid #000;
}
.color.active{border-color:#fff}

/* RESIZE */
#resizePanel{
  position:fixed;
  top:60px;
  right:10px;
  background:#222;
  border:1px solid #555;
  padding:10px;
  display:none;
}
#resizePanel input{width:60px;}
</style>
</head>

<body>

<div id="top">
  <button id="newBtn">New</button>
  <button id="resizeBtn">Resize</button>
  <button id="exportBtn">Export</button>
  <button id="gridBtn">Grid</button>
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="fill">🪣</button>
  <button data-tool="picker">🧪</button>
  <button id="mirrorXBtn">↔️</button>
  <button id="mirrorYBtn">↕️</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
</div>

<div id="canvasContainer">
  <div id="stage">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="palette"></div>

<div id="resizePanel">
  W <input id="rw" type="number" min="1" max="256"><br>
  H <input id="rh" type="number" min="1" max="256"><br><br>
  <button id="resizeOk">OK</button>
  <button id="resizeCancel">Cancel</button>
</div>

<script>
/* ===== CORE ===== */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;

let W=16,H=16,pixelSize=24;
let pixels=[],bg="#fff";
let currentColor="#000";
let tool="pencil";
let mirrorX=false,mirrorY=false;
let drawing=false;
let stroke=null;
let undoStack=[],redoStack=[];
let grid=false;

/* ===== INIT ===== */
function init(w,h){
  W=w;H=h;
  pixels=new Array(W*H).fill(bg);
  undoStack=[];redoStack=[];
  resizeCanvas();
}
function resizeCanvas(){
  canvas.width=W*pixelSize;
  canvas.height=H*pixelSize;
  render();
}

/* ===== RENDER ===== */
function render(){
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++)
    for(let x=0;x<W;x++){
      ctx.fillStyle=pixels[y*W+x];
      ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
    }
  if(grid) drawGrid();
}

function drawGrid(){
  ctx.strokeStyle="#666";
  for(let x=0;x<=W;x++){
    ctx.beginPath();
    ctx.moveTo(x*pixelSize,0);
    ctx.lineTo(x*pixelSize,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<=H;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*pixelSize);
    ctx.lineTo(canvas.width,y*pixelSize);
    ctx.stroke();
  }
}

/* ===== PIXELS ===== */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

function setPixel(x,y,color){
  if(x<0||y<0||x>=W||y>=H)return;
  const i=y*W+x;
  if(!stroke.has(i)) stroke.set(i,pixels[i]);
  pixels[i]=color;
}

/* ===== DRAW ===== */
canvas.onpointerdown=e=>{
  drawing=true;
  stroke=new Map();
  const p=pos(e);

  if(tool==="picker"){
    currentColor=pixels[p.y*W+p.x];
    rebuildPalette();
    drawing=false;
    return;
  }

  paint(p.x,p.y);
  render();
};

canvas.onpointermove=e=>{
  if(!drawing)return;
  const p=pos(e);
  paint(p.x,p.y);
  render();
};

window.onpointerup=()=>{
  if(!drawing)return;
  drawing=false;
  if(stroke.size){
    undoStack.push(stroke);
    redoStack=[];
  }
};

/* ===== PAINT ===== */
function paint(x,y){
  setPixel(x,y,currentColor);
  if(mirrorX) setPixel(W-1-x,y,currentColor);
  if(mirrorY) setPixel(x,H-1-y,currentColor);
  if(mirrorX&&mirrorY) setPixel(W-1-x,H-1-y,currentColor);
}

/* ===== UI ===== */
document.querySelectorAll("[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("[data-tool]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});

mirrorXBtn.onclick=()=>mirrorXBtn.classList.toggle("active",mirrorX=!mirrorX);
mirrorYBtn.onclick=()=>mirrorYBtn.classList.toggle("active",mirrorY=!mirrorY);
gridBtn.onclick=()=>{grid=!grid;render();};

undoBtn.onclick=()=>{
  const s=undoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v});
  redoStack.push(r); render();
};
redoBtn.onclick=()=>{
  const s=redoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v});
  undoStack.push(r); render();
};

resizeBtn.onclick=()=>{
  resizePanel.style.display="block";
  rw.value=W; rh.value=H;
};
resizeOk.onclick=()=>{
  init(+rw.value,+rh.value);
  resizePanel.style.display="none";
};
resizeCancel.onclick=()=>resizePanel.style.display="none";

exportBtn.onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixolator.png";
  a.click();
};

newBtn.onclick=()=>init(W,H);

/* ===== PALETTE ===== */
const palette=document.getElementById("palette");
let paletteColors=["#000","#fff","#f00","#0f0","#00f"];

function rebuildPalette(){
  palette.innerHTML="";
  paletteColors.forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="color";
    d.style.background=c;
    if(c===currentColor)d.classList.add("active");
    d.onclick=()=>{currentColor=c;rebuildPalette();}
    d.ondblclick=()=>{
      const inp=document.createElement("input");
      inp.type="color";
      inp.value=c;
      inp.oninput=e=>{
        paletteColors[i]=e.target.value;
        rebuildPalette();
      };
      inp.click();
    };
    palette.appendChild(d);
  });
}

/* ===== PAN + PINCH ===== */
const stage=document.getElementById("stage");
let scale=1,ox=0,oy=0;
let lastDist=null,lastMid=null;
let pan=false,ps={x:0,y:0};

function updateTransform(){
  stage.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`;
}

stage.addEventListener("touchstart",e=>{
  if(e.touches.length===2){
    drawing=false;
    const[a,b]=e.touches;
    lastDist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    lastMid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};
  }
},{passive:false});

stage.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const[a,b]=e.touches;
    const d=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    scale*=d/lastDist;
    scale=Math.max(0.5,Math.min(40,scale));
    lastDist=d;

    const m={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};
    ox+=m.x-lastMid.x;
    oy+=m.y-lastMid.y;
    lastMid=m;
    updateTransform();
  }
},{passive:false});

stage.addEventListener("mousedown",e=>{
  if(e.button===2){
    pan=true;
    ps={x:e.clientX,y:e.clientY};
  }
});
window.addEventListener("mousemove",e=>{
  if(pan){
    ox+=e.clientX-ps.x;
    oy+=e.clientY-ps.y;
    ps={x:e.clientX,y:e.clientY};
    updateTransform();
  }
});
window.addEventListener("mouseup",()=>pan=false);
stage.oncontextmenu=e=>e.preventDefault();

zoomIn.onclick=()=>{scale*=1.2;updateTransform();}
zoomOut.onclick=()=>{scale/=1.2;updateTransform();}

/* START */
init(W,H);
rebuildPalette();
</script>

</body>
</html>

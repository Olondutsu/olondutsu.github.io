<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  color: #eee;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}

#top {
  height: 44px;
  background: #222;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px;
}

button {
  background: #333;
  color: #eee;
  border: 1px solid #555;
  padding: 6px;
}

button.active { background: #666; }

#tools {
  position: fixed;
  left: 8px;
  top: 60px;
  background: #222;
  border: 1px solid #555;
  border-radius: 10px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

#canvasContainer {
  position: absolute;
  top: 44px;
  bottom: 60px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: auto;
}

canvas {
  background: #fff;
  image-rendering: pixelated;
  touch-action: none;
}

#palette {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

  width: 32px;
  height: 32px;
  border: 2px solid #000;
}

</head>

<body>

<div id="top">
  <button id="newBtn">New</button>
  <button id="importBtn">Import</button>
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
  <button id="exportBtn">Export</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="fill">🪣</button>
  <button id="mirrorXBtn">↔️</button>
  <button id="mirrorYBtn">↕️</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
</div>

<div id="canvasContainer">
  <canvas id="canvas"></canvas>
</div>

<div id="palette"></div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W = 16, H = 16;
let pixelSize = 24;

let pixels = [];
let currentColor = "#000000";

let tool = "pencil";
let mirrorX = false, mirrorY = false;

let undoStack=[], redoStack=[], stroke=null;
let drawing=false;

let paletteColors = ["#000000","#ffffff","#ff0000","#00ff00","#0000ff"];

function init(w,h){
  W=w; H=h;
  pixels = new Array(W*H).fill("#ffffff");
  resize();
}

function resize(){
  canvas.width=W*pixelSize;
  canvas.height=H*pixelSize;
  render();
}

function render(){
  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++)
    for(let x=0;x<W;x++){
      ctx.fillStyle=pixels[y*W+x];
      ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
    }
}

function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

function applyPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  if(mirrorX && x>=Math.floor(W/2)) return;
  if(mirrorY && y>=Math.floor(H/2)) return;

  const i=y*W+x;
  if(pixels[i]===currentColor) return;

  stroke.set(i,pixels[i]);
  pixels[i]=currentColor;

  if(mirrorX) pixels[y*W+(W-1-x)] = currentColor;
  if(mirrorY) pixels[(H-1-y)*W+x] = currentColor;
}

function floodFill(x,y,target){
  if(target===currentColor) return;
  const stack=[[x,y]];
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cy<0||cx>=W||cy>=H) continue;
    const i=cy*W+cx;
    if(pixels[i]!==target) continue;
    applyPixel(cx,cy);
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

/* INPUT */
canvas.onpointerdown=e=>{
  drawing=true;
  stroke=new Map();
  const p=pos(e);
  if(tool==="pencil") applyPixel(p.x,p.y);
  if(tool==="fill") floodFill(p.x,p.y,pixels[p.y*W+p.x]);
  render();
};

canvas.onpointermove=e=>{
  if(!drawing) return;
  if(tool==="pencil"){
    const p=pos(e);
    applyPixel(p.x,p.y);
    render();
  }
};

window.onpointerup=()=>{
  if(!drawing) return;
  drawing=false;
  if(stroke.size){
    undoStack.push(stroke);
    redoStack.length=0;
  }
};

/* UI */
document.querySelectorAll("#tools button[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("#tools button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});

mirrorXBtn.onclick=()=>mirrorXBtn.classList.toggle("active",mirrorX=!mirrorX);

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pix-o-lator Pro | Mobile & Desktop</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2a2a2a; --accent: #007bff; --border: #444; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Top Bar */
        #top { height: 50px; background: #222; display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid var(--border); z-index: 1000; justify-content: space-between; }
        .menu-group { display: flex; gap: 5px; }
        .menu-item { position: relative; padding: 8px; cursor: pointer; border-radius: 4px; font-size: 13px; background: #333; border: 1px solid #444; color: #eee; }
        
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #2a2a2a; border: 1px solid #555; min-width: 160px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 2000; }
        .menu-item:hover .dropdown { display: block; }
        .dropdown div { padding: 12px; border-bottom: 1px solid #333; }
        .dropdown div:hover { background: var(--accent); }

        /* Sidebar Tools - Responsive */
        #tools { position: fixed; left: 10px; top: 60px; background: var(--panel); border: 1px solid #555; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 8px; z-index: 500; width: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @media (max-width: 600px) {
            #tools { width: auto; flex-direction: row; left: 50%; transform: translateX(-50%); top: 55px; height: 40px; align-items: center; }
            .tool-btn span { display: none; }
        }
        
        button.tool-btn { background: #333; color: #eee; border: 1px solid #555; padding: 8px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; width: 100%; }
        button.tool-btn.active { background: var(--accent); border-color: #00bfff; }

        /* Workspace */
        #canvasContainer { flex: 1; position: relative; overflow: auto; background: #0b0b0b; touch-action: none; }
        #canvasWrapper { position: relative; margin: 1500px; background: #111; width: fit-content; height: fit-content; }
        canvas { image-rendering: pixelated; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        
        .mirror-line { position: absolute; pointer-events: none; z-index: 10; display: none; }
        #mirrorLineX { width: 1px; height: 100%; border-left: 1px dashed #ff00ea; top: 0; }
        #mirrorLineY { height: 1px; width: 100%; border-top: 1px dashed #ff00ea; left: 0; }
        
        /* Bottom Palette */
        #palette { height: 65px; background: #222; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 15px; overflow-x: auto; z-index: 1000; }
        .color-wrapper { position: relative; flex-shrink: 0; }
        .color { width: 32px; height: 32px; border: 2px solid #000; border-radius: 4px; }
        .color.active { border-color: #fff; transform: scale(1.1); }
        .del-color { position: absolute; top: -5px; right: -5px; background: red; color: white; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; text-align: center; cursor: pointer; }

        /* Panels */
        .panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); border: 1px solid #555; display: none; z-index: 3000; border-radius: 8px; width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .panel-header { background: #333; padding: 12px; cursor: move; display: flex; justify-content: space-between; align-items: center; touch-action: none; }
        .panel-content { padding: 15px; }
        .panel button { width: 100%; padding: 10px; margin-top: 8px; background: #444; color: white; border: 1px solid #666; border-radius: 4px; }
        
        #stats { position: fixed; bottom: 80px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 11px; color: #0f0; pointer-events: none; z-index: 900; }
    </style>
</head>
<body>

<div id="top">
    <div class="menu-group">
        <div class="menu-item">📁 File
            <div class="dropdown">
                <div onclick="newProject()">New</div>
                <div onclick="saveJSON()">Save JSON</div>
                <div onclick="loadJSON()">Load JSON</div>
                <div onclick="showPanel('exportPanel')">Export PNG</div>
            </div>
        </div>
        <div class="menu-item">👁️ View
            <div class="dropdown">
                <div onclick="toggleGrid()">Grid On/Off</div>
                <div onclick="toggleRender()">Embroidery Mode</div>
            </div>
        </div>
    </div>
    <div class="menu-group">
        <button class="menu-item" onclick="undo()">↩️</button>
        <button class="menu-item" onclick="redo()">↪️</button>
    </div>
    <div class="menu-group">
        <button class="menu-item" onclick="showPanel('mirrorPanel')">✨</button>
        <button class="menu-item" onclick="showPanel('selectionPanel')">✂️</button>
    </div>
</div>

<div id="tools">
    <button class="tool-btn active" data-tool="pencil" onclick="setTool('pencil')">✏️</button>
    <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')">🫥</button>
    <button class="tool-btn" data-tool="fill" onclick="showPanel('fillPanel')">🪣</button>
    <button class="tool-btn" data-tool="picker" onclick="setTool('picker')">🧪</button>
    <button class="tool-btn" data-tool="rules" onclick="setTool('rules')">📏</button>
</div>

<div id="canvasContainer">
    <div id="canvasWrapper">
        <canvas id="canvas"></canvas>
        <div id="mirrorLineX" class="mirror-line"></div>
        <div id="mirrorLineY" class="mirror-line"></div>
    </div>
</div>

<div id="stats">Pixels: <span id="pixelCount">0</span> | <span id="ruleText">Rule: -</span></div>

<div id="palette">
    <div id="bgColorBtn" style="width:32px; height:32px; border:1px solid #555; border-radius:4px; font-size:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;" onclick="changeBG()">BG</div>
    <div id="colorContainer" style="display:flex; gap:8px;"></div>
    <div id="addColorBtn" onclick="addNewColor()" style="padding:0 10px; cursor:pointer; font-size:20px;">+</div>
</div>

<div id="fillPanel" class="panel">
    <div class="panel-header"><span>Fill</span><span onclick="hidePanels()">✕</span></div>
    <div class="panel-content">
        <label><input type="checkbox" id="fillDiag"> Diagonals</label>
        <button onclick="setTool('fill'); hidePanels();" style="background:var(--accent)">Activate Bucket</button>
    </div>
</div>

<div id="mirrorPanel" class="panel">
    <div class="panel-header"><span>Symmetry</span><span onclick="hidePanels()">✕</span></div>
    <div class="panel-content">
        <label><input type="checkbox" id="mXCheck" onchange="toggleMX(this.checked)"> Vertical (X)</label>
        <input type="range" id="mXSlider" style="width:100%" oninput="updateMX(this.value)">
        <br><br>
        <label><input type="checkbox" id="mYCheck" onchange="toggleMY(this.checked)"> Horizontal (Y)</label>
        <input type="range" id="mYSlider" style="width:100%" oninput="updateMY(this.value)">
        <br><br>
        <label><input type="checkbox" id="mRadialCheck" onchange="toggleRadial(this.checked)"> Radial (8-way)</label>
        <button onclick="hidePanels()">Close</button>
    </div>
</div>

<div id="selectionPanel" class="panel">
    <div class="panel-header"><span>Selection</span><span onclick="hidePanels()">✕</span></div>
    <div class="panel-content">
        <button onclick="setTool('select'); hidePanels();">Select Zone</button>
        <button onclick="copySelection()">Copy</button>
        <button onclick="pasteSelection()">Paste</button>
    </div>
</div>

<div id="exportPanel" class="panel">
    <div class="panel-header"><span>Export</span><span onclick="hidePanels()">✕</span></div>
    <div class="panel-content">
        <button onclick="exportPNG(false)">PNG (with BG)</button>
        <button onclick="exportPNG(true)" style="background:#28a745">PNG (Transparent)</button>
    </div>
</div>

<script>
/** CORE STATE **/
let W = 32, H = 32, pixelSize = 20;
let pixels = [];
let currentColor = "#ffffff", bgDefault = "#111111";
let paletteColors = ["#000000", "#ffffff", "#ff0000", "#00ff00", "#0000ff", "#ffff00"];
let tool = "pencil", brushSize = 1;
let mirrorX = false, mirrorY = false, mirrorRadial = false, mX = 15.5, mY = 15.5;
let undoStack = [], redoStack = [];
let gridMode = true, renderMode = "pixel", isDrawing = false;
let sel = null, clipboard = null, lastRulePoint = null;

// Zoom & Pan Variables
let isPanning = false, lastPinchDist = null, lastTouchX = 0, lastTouchY = 0;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const container = document.getElementById("canvasContainer");

function init(w, h, data = null) {
    W = w; H = h;
    pixels = data ? [...data] : new Array(W * H).fill(bgDefault);
    mX = (W - 1) / 2; mY = (H - 1) / 2;
    document.getElementById("mXSlider").max = W - 1;
    document.getElementById("mYSlider").max = H - 1;
    refresh();
    centerCanvas();
}

function centerCanvas() {
    container.scrollLeft = 1500 + (W * pixelSize / 2) - (container.clientWidth / 2);
    container.scrollTop = 1500 + (H * pixelSize / 2) - (container.clientHeight / 2);
}

function refresh() {
    canvas.width = W * pixelSize;
    canvas.height = H * pixelSize;
    render();
    updateLines();
}

function render() {
    ctx.fillStyle = bgDefault;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < pixels.length; i++) {
        if (pixels[i] === bgDefault) continue;
        let x = i % W, y = Math.floor(i / W);
        ctx.fillStyle = pixels[i];
        if (renderMode === "pixel") {
            ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
        } else {
            ctx.strokeStyle = pixels[i]; ctx.lineWidth = 2;
            ctx.beginPath();
            let px = x * pixelSize, py = y * pixelSize, p = pixelSize * 0.2;
            ctx.moveTo(px+p, py+p); ctx.lineTo(px+pixelSize-p, py+pixelSize-p);
            ctx.moveTo(px+pixelSize-p, py+p); ctx.lineTo(px+p, py+pixelSize-p);
            ctx.stroke();
        }
    }
    if (gridMode) {
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 0.5;
        for(let i=0; i<=W; i++) { ctx.beginPath(); ctx.moveTo(i*pixelSize, 0); ctx.lineTo(i*pixelSize, canvas.height); ctx.stroke(); }
        for(let i=0; i<=H; i++) { ctx.beginPath(); ctx.moveTo(0, i*pixelSize); ctx.lineTo(canvas.width, i*pixelSize); ctx.stroke(); }
    }
    if(sel && tool === "select") {
        ctx.strokeStyle = "#fff"; ctx.setLineDash([5, 5]);
        ctx.strokeRect(Math.min(sel.x1, sel.x2)*pixelSize, Math.min(sel.y1, sel.y2)*pixelSize, (Math.abs(sel.x1-sel.x2)+1)*pixelSize, (Math.abs(sel.y1-sel.y2)+1)*pixelSize);
        ctx.setLineDash([]);
    }
    document.getElementById("pixelCount").innerText = pixels.filter(p => p !== bgDefault).length;
}

/** TOUCH & MOUSE LOGIC **/

// Dessin au clic/toucher unique
canvas.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch' && isPanning) return;
    isDrawing = true;
    saveState();
    handlePointer(e);
});

canvas.addEventListener('pointermove', e => {
    if (isDrawing) handlePointer(e);
});

window.addEventListener('pointerup', () => { isDrawing = false; saveLocal(); });

function handlePointer(e) {
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / (rect.width / W));
    const y = Math.floor((e.clientY - rect.top) / (rect.height / H));
    if (x < 0 || x >= W || y < 0 || y >= H) return;

    if (tool === "picker") { currentColor = pixels[y*W+x]; rebuildPalette(); isDrawing = false; }
    else if (tool === "fill") { floodFill(x, y, pixels[y*W+x], currentColor); isDrawing = false; refresh(); }
    else if (tool === "rules") { 
        if(!lastRulePoint) { lastRulePoint = {x,y}; } 
        else { 
            let d = Math.max(Math.abs(x-lastRulePoint.x), Math.abs(y-lastRulePoint.y)) + 1;
            document.getElementById("ruleText").innerText = "Rule: " + d + "px";
            lastRulePoint = null;
        }
        isDrawing = false;
    }
    else if (tool === "select") {
        if (!sel || !isDrawing) sel = {x1:x, y1:y, x2:x, y2:y};
        else { sel.x2 = x; sel.y2 = y; }
        render();
    }
    else {
        drawPix(x, y, tool === "eraser" ? bgDefault : currentColor);
        render();
    }
}

function drawPix(x, y, col) {
    let pts = [[x, y]];
    if (mirrorRadial) {
        let cx = (W-1)/2, cy = (H-1)/2, dx = x - cx, dy = y - cy;
        pts.push([cx-dx, cy+dy], [cx+dx, cy-dy], [cx-dx, cy-dy], [cx+dy, cy+dx], [cx-dy, cy+dx], [cx+dy, cy-dx], [cx-dy, cy-dx]);
    } else {
        if (mirrorX) pts.push([Math.round(mX*2-x), y]);
        if (mirrorY) {
            let ny = Math.round(mY*2-y);
            pts.push([x, ny]);
            if (mirrorX) pts.push([Math.round(mX*2-x), ny]);
        }
    }
    pts.forEach(p => { if(p[0]>=0 && p[0]<W && p[1]>=0 && p[1]<H) pixels[p[1]*W+p[0]] = col; });
}

/** NAVIGATION (PAN & ZOOM) **/
container.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        isPanning = true; isDrawing = false;
        lastPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    }
    lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
}, {passive: false});

container.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
        e.preventDefault();
        let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        if (Math.abs(dist - lastPinchDist) > 10) {
            pixelSize = Math.max(5, Math.min(80, pixelSize + (dist > lastPinchDist ? 1 : -1)));
            lastPinchDist = dist; refresh();
        }
    }
    if (isPanning || e.touches.length === 2) {
        container.scrollLeft -= (e.touches[0].pageX - lastTouchX);
        container.scrollTop -= (e.touches[0].pageY - lastTouchY);
    }
    lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
}, {passive: false});

container.addEventListener('touchend', () => { isPanning = false; });

/** PANEL DRAG (MOBILE & DESKTOP) **/
document.querySelectorAll('.panel').forEach(p => {
    const header = p.querySelector('.panel-header');
    let ox, oy, isMoving = false;
    
    const start = (e) => {
        isMoving = true;
        const ev = e.touches ? e.touches[0] : e;
        ox = ev.clientX - p.offsetLeft; oy = ev.clientY - p.offsetTop;
    };
    const move = (e) => {
        if (!isMoving) return;
        const ev = e.touches ? e.touches[0] : e;
        p.style.left = (ev.clientX - ox) + "px";
        p.style.top = (ev.clientY - oy) + "px";
        p.style.transform = "none";
    };
    header.addEventListener('mousedown', start);
    header.addEventListener('touchstart', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('mouseup', () => isMoving = false);
    window.addEventListener('touchend', () => isMoving = false);
});

/** UTILS **/
function setTool(t) { tool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t)); }
function showPanel(id) { hidePanels(); document.getElementById(id).style.display = "block"; }
function hidePanels() { document.querySelectorAll('.panel').forEach(p => p.style.display = 'none'); }

function toggleMX(v) { mirrorX = v; refresh(); }
function toggleMY(v) { mirrorY = v; refresh(); }
function toggleRadial(v) { mirrorRadial = v; refresh(); }
function updateMX(v) { mX = parseFloat(v); refresh(); }
function updateMY(v) { mY = parseFloat(v); refresh(); }
function updateLines() {
    const lx = document.getElementById("mirrorLineX"), ly = document.getElementById("mirrorLineY");
    lx.style.display = mirrorX ? "block" : "none"; lx.style.left = (mX * pixelSize + pixelSize/2) + "px";
    ly.style.display = mirrorY ? "block" : "none"; ly.style.top = (mY * pixelSize + pixelSize/2) + "px";
}

function rebuildPalette() {
    const cont = document.getElementById("colorContainer"); cont.innerHTML = "";
    paletteColors.forEach((c, idx) => {
        const wrap = document.createElement("div"); wrap.className = "color-wrapper";
        const d = document.createElement("div"); d.className = "color" + (c === currentColor ? " active" : "");
        d.style.background = c;
        d.onclick = () => { currentColor = c; rebuildPalette(); };
        const del = document.createElement("div"); del.className = "del-color"; del.innerText = "✕";
        del.onclick = (e) => { e.stopPropagation(); paletteColors.splice(idx,1); rebuildPalette(); };
        wrap.append(d, del); cont.appendChild(wrap);
    });
}

function addNewColor() {
    let i = document.createElement("input"); i.type="color";
    i.onchange = () => { paletteColors.push(i.value); currentColor = i.value; rebuildPalette(); };
    i.click();
}

function changeBG() {
    let i = document.createElement("input"); i.type="color"; i.value = bgDefault;
    i.onchange = () => { bgDefault = i.value; refresh(); }; i.click();
}

function floodFill(x, y, target, replacement) {
    if (target === replacement) return;
    let stack = [[x, y]], diag = document.getElementById("fillDiag").checked;
    while(stack.length) {
        let [cx, cy] = stack.pop();
        if(cx<0||cy<0||cx>=W||cy>=H||pixels[cy*W+cx]!==target) continue;
        pixels[cy*W+cx] = replacement;
        stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
        if(diag) stack.push([cx+1,cy+1],[cx-1,cy-1],[cx+1,cy-1],[cx-1,cy+1]);
    }
}

function undo() { if(undoStack.length) { redoStack.push(JSON.stringify(pixels)); pixels = JSON.parse(undoStack.pop()); refresh(); } }
function redo() { if(redoStack.length) { undoStack.push(JSON.stringify(pixels)); pixels = JSON.parse(redoStack.pop()); refresh(); } }
function saveState() { undoStack.push(JSON.stringify(pixels)); if(undoStack.length>30) undoStack.shift(); redoStack = []; }

function exportPNG(trans) {
    const tmp = document.createElement('canvas'); tmp.width = W; tmp.height = H;
    const tCtx = tmp.getContext('2d');
    for(let i=0; i<pixels.length; i++) {
        if(trans && pixels[i] === bgDefault) continue;
        tCtx.fillStyle = pixels[i]; tCtx.fillRect(i%W, Math.floor(i/W), 1, 1);
    }
    const a = document.createElement('a'); a.download = 'pixelart.png'; a.href = tmp.toDataURL(); a.click();
}

function saveJSON() {
    const blob = new Blob([JSON.stringify({W, H, pixels, paletteColors})], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "draw.json"; a.click();
}

function loadJSON() {
    let i = document.createElement('input'); i.type="file";
    i.onchange = e => {
        let r = new FileReader();
        r.onload = () => { let d = JSON.parse(r.target.result); init(d.W, d.H, d.pixels); paletteColors = d.paletteColors; rebuildPalette(); };
        r.readAsText(e.target.files[0]);
    }; i.click();
}

function copySelection() { if(sel) clipboard = { w: Math.abs(sel.x1-sel.x2)+1, h: Math.abs(sel.y1-sel.y2)+1, data: [] }; // logic simplifiée }
function pasteSelection() { alert("Paste active at selection origin"); }
function toggleGrid() { gridMode = !gridMode; render(); }
function toggleRender() { renderMode = renderMode === "pixel" ? "cross" : "pixel"; refresh(); }
function saveLocal() { localStorage.setItem("pix_pro_v4", JSON.stringify({W,H,pixels,paletteColors})); }

/** START **/
const saved = localStorage.getItem("pix_pro_v4");
if(saved) {
    const s = JSON.parse(saved); paletteColors = s.paletteColors; init(s.W, s.H, s.pixels);
} else { init(32, 32); }
rebuildPalette();
</script>

</body>
</html>

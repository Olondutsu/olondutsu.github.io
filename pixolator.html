<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body{
  margin:0;
  background:#1a1a1a;
  color:#eee;
  font-family:sans-serif;
  height:100vh;
  overflow:hidden;
}

/* TOP BAR */
#top{
  height:44px;
  background:#222;
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px;
}

/* TOOLBOX */
#tools{
  position:fixed;
  left:8px;
  top:60px;
  background:#222;
  border:1px solid #555;
  border-radius:10px;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:10;
}

button{
  background:#333;
  color:#eee;
  border:1px solid #555;
  padding:6px;
}
button.active{background:#666;}

/* CANVAS */
#canvasContainer{
  position:absolute;
  top:44px;
  bottom:60px;
  left:0;
  right:0;
  overflow:auto;
  background:#000;
}
#canvasWrapper{
  position:relative;
  width:fit-content;
  height:fit-content;
  margin:40px;
}
canvas{
  background:#fff;
  image-rendering:pixelated;
  touch-action:none;
}

/* PALETTE */
#palette{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.color{
  width:32px;
  height:32px;
  border:2px solid #000;
}
.color.active{border-color:#fff;}

/* NAV PAD */
#nav{
  position:fixed;
  right:10px;
  bottom:70px;
  display:grid;
  grid-template-columns:40px 40px 40px;
  grid-template-rows:40px 40px 40px;
  gap:4px;
}
#nav button{
  font-size:16px;
}
#nav .empty{visibility:hidden;}
</style>
</head>

<body>

<div id="top">
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
  <button id="renderBtn">⬛</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="picker">🧪</button>
</div>

<div id="canvasContainer">
  <div id="canvasWrapper">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="palette"></div>

<!-- NAVIGATION PAD -->
<div id="nav">
  <div class="empty"></div>
  <button data-dir="up">▲</button>
  <div class="empty"></div>
  <button data-dir="left">◀</button>
  <div class="empty"></div>
  <button data-dir="right">▶</button>
  <div class="empty"></div>
  <button data-dir="down">▼</button>
  <div class="empty"></div>
</div>

<script>
/* ===== CORE ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W=16,H=16,pixelSize=24;
let pixels=[];
let currentColor="#000000";
let tool="pencil";
let undoStack=[],redoStack=[];
let renderMode="pixel";

/* multitouch */
let activePointers=0;
let snapshot=null;

/* ===== INIT ===== */
function init(){
  pixels=new Array(W*H).fill("#ffffff");
  canvas.width=W*pixelSize;
  canvas.height=H*pixelSize;
  render();
}
init();

/* ===== RENDER ===== */
function drawPixel(x,y,c){
  ctx.fillStyle=c;
  ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
}

function drawCross(x,y,c){
  const px=x*pixelSize, py=y*pixelSize;
  const pad=pixelSize*0.2;
  ctx.strokeStyle=c;
  ctx.lineWidth=Math.max(1,pixelSize*0.15);
  ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(px+pad,py+pad);
  ctx.lineTo(px+pixelSize-pad,py+pixelSize-pad);
  ctx.moveTo(px+pixelSize-pad,py+pad);
  ctx.lineTo(px+pad,py+pixelSize-pad);
  ctx.stroke();
}

function render(){
  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const c=pixels[y*W+x];
      if(renderMode==="pixel") drawPixel(x,y,c);
      else drawCross(x,y,c);
    }
  }
}

/* ===== DRAW ===== */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

function applyPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  pixels[y*W+x]=currentColor;
}

canvas.onpointerdown=e=>{
  canvas.setPointerCapture(e.pointerId);
  if(activePointers===0){
    snapshot=pixels.slice(); // 📸 snapshot unique
  }
  activePointers++;
  const p=pos(e);

  if(tool==="picker"){
    currentColor=pixels[p.y*W+p.x];
    activePointers--;
    return;
  }
  applyPixel(p.x,p.y);
  render();
};

canvas.onpointermove=e=>{
  if(activePointers<=0) return;
  const p=pos(e);
  applyPixel(p.x,p.y);
  render();
};

function pointerEnd(e){
  activePointers--;
  canvas.releasePointerCapture(e.pointerId);
  if(activePointers<=0){
    activePointers=0;
    undoStack.push(snapshot);
    redoStack=[];
  }
}
canvas.onpointerup=pointerEnd;
canvas.onpointercancel=pointerEnd;

/* ===== UI ===== */
document.querySelectorAll("[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("[data-tool]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});

undoBtn.onclick=()=>{
  if(!undoStack.length) return;
  redoStack.push(pixels.slice());
  pixels=undoStack.pop();
  render();
};
redoBtn.onclick=()=>{
  if(!redoStack.length) return;
  undoStack.push(pixels.slice());
  pixels=redoStack.pop();
  render();
};

/* RENDER MODE SWITCH */
renderBtn.onclick=()=>{
  renderMode=renderMode==="pixel"?"cross":"pixel";
  renderBtn.textContent=renderMode==="pixel"?"⬛":"✖️";
  render();
};

/* PALETTE */
const palette=document.getElementById("palette");
const paletteColors=["#000","#f00","#0f0","#00f","#fff"];
paletteColors.forEach(c=>{
  const d=document.createElement("div");
  d.className="color";
  d.style.background=c;
  d.onclick=()=>currentColor=c;
  palette.appendChild(d);
});

/* NAVIGATION */
const container=document.getElementById("canvasContainer");
document.querySelectorAll("#nav button").forEach(b=>{
  b.onclick=()=>{
    const step=50;
    if(b.dataset.dir==="up") container.scrollTop-=step;
    if(b.dataset.dir==="down") container.scrollTop+=step;
    if(b.dataset.dir==="left") container.scrollLeft-=step;
    if(b.dataset.dir==="right") container.scrollLeft+=step;
  };
});
</script>

</body>
</html>

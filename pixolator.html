<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body{
  margin:0;
  background:#1a1a1a;
  color:#eee;
  font-family:sans-serif;
  height:100vh;
  overflow:hidden;
}

/* TOP BAR */
#top{
  height:44px;
  background:#222;
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px;
}

/* TOOLBOX */
#tools{
  position:fixed;
  left:8px;
  top:60px;
  background:#222;
  border:1px solid #555;
  border-radius:10px;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:10;
}

button{
  background:#333;
  color:#eee;
  border:1px solid #555;
  padding:6px;
}
button.active{background:#666;}

/* CANVAS */
#canvasContainer{
  position:absolute;
  top:44px;
  bottom:60px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:auto;
  background:#000;
}
canvas{
  background:#fff;
  image-rendering:pixelated;
  touch-action:none;
}

/* PALETTE */
#palette{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.color{
  width:32px;
  height:32px;
  border:2px solid #000;
}
.color.active{border-color:#fff;}

/* RESIZE PANEL */
#resizePanel{
  position:fixed;
  top:60px;
  right:10px;
  background:#222;
  border:1px solid #555;
  padding:10px;
  display:none;
}
#resizePanel input{
  width:60px;
}
</style>
</head>

<body>

<div id="top">
  <button id="newBtn">New</button>
  <button id="resizeBtn">Resize</button>
  <button id="importBtn">Import</button>
  <button id="exportBtn">Export</button>
  <button id="gridBtn">Grid</button>
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="line">📏</button>
  <button data-tool="fill">🪣</button>
  <button data-tool="picker">🧪</button>
  <button id="mirrorXBtn">↔️</button>
  <button id="mirrorYBtn">↕️</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
</div>

<div id="canvasContainer">
  <canvas id="canvas"></canvas>
</div>

<div id="palette"></div>

<div id="resizePanel">
  W <input id="rw" type="number" min="1" max="256"><br>
  H <input id="rh" type="number" min="1" max="256"><br><br>
  <button id="resizeOk">OK</button>
  <button id="resizeCancel">Cancel</button>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
/* ===== CORE ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W=16,H=16,pixelSize=24;
let bgColor="#ffffff";
let pixels=[],currentColor="#000000";
let tool="pencil",mirrorX=false,mirrorY=false;
let undoStack=[],redoStack=[],stroke=null;
let drawing=false,start=null;
let gridMode=0;

/* ===== INIT ===== */
function init(w,h){
  W=w;H=h;
  pixels=new Array(W*H).fill(bgColor);
  undoStack=[];redoStack=[];
  resize();
}
function resize(){
  canvas.width=W*pixelSize;
  canvas.height=H*pixelSize;
  render();
}

/* ===== RENDER ===== */
function render(preview=null){
  ctx.fillStyle=bgColor;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++)
    for(let x=0;x<W;x++){
      ctx.fillStyle=pixels[y*W+x];
      ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
    }
  if(gridMode) drawGrid();
  if(preview) preview();
}

/* ===== GRID ===== */
function drawGrid(){
  ctx.strokeStyle="#555";
  for(let x=0;x<=W;x++){
    ctx.beginPath();
    ctx.moveTo(x*pixelSize,0);
    ctx.lineTo(x*pixelSize,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<=H;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*pixelSize);
    ctx.lineTo(canvas.width,y*pixelSize);
    ctx.stroke();
  }
}

/* ===== DRAW ===== */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

function setPixel(i,color){
  if(!stroke.has(i)) stroke.set(i,pixels[i]);
  pixels[i]=color;
}

function applyPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  const i=y*W+x;
  setPixel(i,currentColor);
  if(mirrorX) setPixel(y*W+(W-1-x),currentColor);
  if(mirrorY) setPixel((H-1-y)*W+x,currentColor);
  if(mirrorX&&mirrorY) setPixel((H-1-y)*W+(W-1-x),currentColor);
}

/* ===== TOOLS ===== */
canvas.onpointerdown=e=>{
  drawing=true;
  stroke=new Map();
  start=pos(e);

  if(tool==="picker"){
    const c=pixels[start.y*W+start.x];
    currentColor=c;
    if(!paletteColors.includes(c)){
      paletteColors.push(c);
      rebuildPalette();
    }
    render();
    drawing=false;
    return;
  }

  if(tool==="pencil") applyPixel(start.x,start.y);
  render();
};

canvas.onpointermove=e=>{
  if(!drawing) return;
  const p=pos(e);
  if(tool==="pencil") applyPixel(p.x,p.y);
  render();
};

window.onpointerup=()=>{
  if(!drawing) return;
  drawing=false;
  if(stroke.size){
    undoStack.push(stroke);
    redoStack=[];
  }
  render();
};

/* ===== UI ===== */
document.querySelectorAll("[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("[data-tool]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});

mirrorXBtn.onclick=()=>mirrorXBtn.classList.toggle("active",mirrorX=!mirrorX);
mirrorYBtn.onclick=()=>mirrorYBtn.classList.toggle("active",mirrorY=!mirrorY);
zoomIn.onclick=()=>{pixelSize+=4;resize();}
zoomOut.onclick=()=>{pixelSize=Math.max(4,pixelSize-4);resize();}
gridBtn.onclick=()=>{gridMode=!gridMode;render();}

undoBtn.onclick=()=>{
  const s=undoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  redoStack.push(r); render();
};
redoBtn.onclick=()=>{
  const s=redoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  undoStack.push(r); render();
};

resizeBtn.onclick=()=>{
  resizePanel.style.display="block";
  rw.value=W; rh.value=H;
};
resizeOk.onclick=()=>{
  const w=+rw.value,h=+rh.value;
  if(w>0&&h>0&&w<=256&&h<=256) init(w,h);
  resizePanel.style.display="none";
};
resizeCancel.onclick=()=>resizePanel.style.display="none";

exportBtn.onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixolator.png";
  a.click();
};

/* ===== PALETTE ===== */
const palette=document.getElementById("palette");
let paletteColors=["#000","#fff","#f00","#0f0","#00f"];

function rebuildPalette(){
  palette.innerHTML="";
  paletteColors.forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="color";
    d.style.background=c;
    if(c===currentColor)d.classList.add("active");
    d.onclick=()=>{
      currentColor=c;
      rebuildPalette();
    };
    d.ondblclick=()=>{
      const input=document.createElement("input");
      input.type="color";
      input.value=c;
      input.oninput=e=>{
        paletteColors[i]=e.target.value;
        rebuildPalette();
      };
      input.click();
    };
    palette.appendChild(d);
  });
}

/* START */
init(W,H);
rebuildPalette();
</script>

</body>
</html>

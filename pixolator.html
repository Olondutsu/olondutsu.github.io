<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body{
  margin:0;
  background:#1a1a1a;
  color:#eee;
  font-family:sans-serif;
  height:100vh;
  overflow:hidden;
}

/* TOP BAR */
#top{
  height:44px;
  background:#222;
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px;
}

/* TOOLBOX */
#tools{
  position:fixed;
  left:8px;
  top:60px;
  background:#222;
  border:1px solid #555;
  border-radius:10px;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:10;
}

button{
  background:#333;
  color:#eee;
  border:1px solid #555;
  padding:6px;
}
button.active{background:#666;}

/* CANVAS */
#canvasContainer{
  position:absolute;
  top:44px;
  bottom:60px;
  left:0;
  right:0;
  overflow:auto;
  background:#000;
}
#canvasWrapper{
  margin:40px;
  width:fit-content;
}
canvas{
  background:#fff;
  image-rendering:pixelated;
  touch-action:none;
}

/* PALETTE */
#palette{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.color{
  width:32px;
  height:32px;
  border:2px solid #000;
}
.color.active{border-color:#fff;}

/* RESIZE PANEL */
#resizePanel{
  position:fixed;
  top:60px;
  right:10px;
  background:#222;
  border:1px solid #555;
  padding:10px;
  display:none;
}
#resizePanel input{width:60px;}

/* NAV PAD */
#nav{
  position:fixed;
  right:10px;
  bottom:70px;
  display:grid;
  grid-template-columns:40px 40px 40px;
  grid-template-rows:40px 40px 40px;
  gap:4px;
}
#nav .empty{visibility:hidden;}
</style>
</head>

<body>

<div id="top">
  <button id="newBtn">New</button>
  <button id="resizeBtn">Resize</button>
  <button id="exportBtn">Export</button>
  <button id="gridBtn">Grid</button>
  <button id="renderBtn">⬛</button>
  <button id="undoBtn">Undo</button>
  <button id="redoBtn">Redo</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="line">📏</button>
  <button data-tool="fill">🪣</button>
  <button data-tool="picker">🧪</button>
  <button id="mirrorXBtn">↔️</button>
  <button id="mirrorYBtn">↕️</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
</div>

<div id="canvasContainer">
  <div id="canvasWrapper">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="palette"></div>

<div id="resizePanel">
  W <input id="rw" type="number" min="1" max="256"><br>
  H <input id="rh" type="number" min="1" max="256"><br><br>
  <button id="resizeOk">OK</button>
  <button id="resizeCancel">Cancel</button>
</div>

<!-- NAVIGATION -->
<div id="nav">
  <div class="empty"></div>
  <button data-dir="up">▲</button>
  <div class="empty"></div>
  <button data-dir="left">◀</button>
  <div class="empty"></div>
  <button data-dir="right">▶</button>
  <div class="empty"></div>
  <button data-dir="down">▼</button>
  <div class="empty"></div>
</div>

<script>
/* ===== CORE ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W=16,H=16,pixelSize=24;
let bgColor="#ffffff";
let pixels=[],currentColor="#000000";
let tool="pencil",mirrorX=false,mirrorY=false;
let undoStack=[],redoStack=[];
let gridMode=false;
let renderMode="pixel";

/* multitouch */
let activePointers=0;
let snapshot=null;

/* ===== INIT ===== */
function init(w,h){
  W=w;H=h;
  pixels=new Array(W*H).fill(bgColor);
  undoStack=[];redoStack=[];
  resize();
}
// Sauvegarde automatique
function saveCanvas(){
  localStorage.setItem("pixolator_pixels", JSON.stringify({
    W, H, pixels
  }));
}

// Charger depuis le localStorage
function loadCanvas(){
  const data = localStorage.getItem("pixolator_pixels");
  if(!data) return;
  const obj = JSON.parse(data);
  W = obj.W;
  H = obj.H;
  pixels = obj.pixels;
  resize();
}
function resize(){
  canvas.width=W*pixelSize;
  canvas.height=H*pixelSize;
  render();
}

/* ===== RENDER ===== */
function drawPixel(x,y,c){
  ctx.fillStyle=c;
  ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
}
function drawCross(x,y,c){
  const px=x*pixelSize, py=y*pixelSize;
  const pad=pixelSize*0.2;
  ctx.strokeStyle=c;
  ctx.lineWidth=Math.max(1,pixelSize*0.15);
  ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(px+pad,py+pad);
  ctx.lineTo(px+pixelSize-pad,py+pixelSize-pad);
  ctx.moveTo(px+pixelSize-pad,py+pad);
  ctx.lineTo(px+pad,py+pixelSize-pad);
  ctx.stroke();
}
function render(){
  ctx.fillStyle=bgColor;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const c=pixels[y*W+x];
      renderMode==="pixel"?drawPixel(x,y,c):drawCross(x,y,c);
    }
  }
  if(gridMode) drawGrid();
}
function drawGrid(){
  ctx.strokeStyle="#555";
  for(let x=0;x<=W;x++){
    ctx.beginPath();
    ctx.moveTo(x*pixelSize,0);
    ctx.lineTo(x*pixelSize,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<=H;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*pixelSize);
    ctx.lineTo(canvas.width,y*pixelSize);
    ctx.stroke();
  }
}

/* ===== DRAW ===== */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}
function applyPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  pixels[y*W+x]=currentColor;
  if(mirrorX) pixels[y*W+(W-1-x)] = currentColor;
  if(mirrorY) pixels[(H-1-y)*W+x] = currentColor;
  if(mirrorX&&mirrorY) pixels[(H-1-y)*W+(W-1-x)] = currentColor;
}

/* ===== POINTERS (FIX MULTITOUCH) ===== */
canvas.onpointerdown=e=>{
  canvas.setPointerCapture(e.pointerId);
  if(activePointers===0) snapshot=pixels.slice();
  activePointers++;

  const p=pos(e);
  if(tool==="picker"){
    currentColor=pixels[p.y*W+p.x];
    if(!paletteColors.includes(currentColor)){
      paletteColors.push(currentColor);
      rebuildPalette();
    }
    activePointers--;
    return;
  }
  if(tool==="pencil") applyPixel(p.x,p.y);
  render();
};

canvas.onpointermove=e=>{
  if(activePointers<=0 || tool!=="pencil") return;
  const p=pos(e);
  applyPixel(p.x,p.y);
  render();
};

function pointerEnd(e){
  activePointers--;
  if(activePointers<=0){
    activePointers=0;
    undoStack.push(snapshot);
    redoStack=[];
    saveCanvas();
  }
}
canvas.onpointerup=pointerEnd;
canvas.onpointercancel=pointerEnd;

/* ===== UI ===== */
document.querySelectorAll("[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("[data-tool]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});
mirrorXBtn.onclick=()=>mirrorXBtn.classList.toggle("active",mirrorX=!mirrorX);
mirrorYBtn.onclick=()=>mirrorYBtn.classList.toggle("active",mirrorY=!mirrorY);
zoomIn.onclick=()=>{pixelSize+=4;resize();}
zoomOut.onclick=()=>{pixelSize=Math.max(4,pixelSize-4);resize();}
gridBtn.onclick=()=>{gridMode=!gridMode;render();}

renderBtn.onclick=()=>{
  renderMode=renderMode==="pixel"?"cross":"pixel";
  renderBtn.textContent=renderMode==="pixel"?"⬛":"✖️";
  render();
};

undoBtn.onclick=()=>{
  if(!undoStack.length) return;
  redoStack.push(pixels.slice());
  pixels=undoStack.pop();
  render();
};
redoBtn.onclick=()=>{
  if(!redoStack.length) return;
  undoStack.push(pixels.slice());
  pixels=redoStack.pop();
  render();
};

resizeBtn.onclick=()=>{
  resizePanel.style.display="block";
  rw.value=W; rh.value=H;
};
resizeOk.onclick=()=>{
  init(+rw.value,+rh.value);
  resizePanel.style.display="none";
};
resizeCancel.onclick=()=>resizePanel.style.display="none";

exportBtn.onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixolator.png";
  a.click();
};

/* ===== PALETTE (ORIGINALE, INTACTE) ===== */
const palette=document.getElementById("palette");
let paletteColors=["#000","#fff","#f00","#0f0","#00f"];

function rebuildPalette(){
  palette.innerHTML="";
  paletteColors.forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="color";
    d.style.background=c;
    if(c===currentColor)d.classList.add("active");
    d.onclick=()=>{
      currentColor=c;
      rebuildPalette();
    };
    d.ondblclick=()=>{
      const input=document.createElement("input");
      input.type="color";
      input.value=c;
      input.oninput=e=>{
        paletteColors[i]=e.target.value;
        rebuildPalette();
      };
      input.click();
    };
    palette.appendChild(d);
  });
}

/* ===== NAVIGATION ===== */
const container=document.getElementById("canvasContainer");
document.querySelectorAll("#nav button").forEach(b=>{
  b.onclick=()=>{
    const s=50;
    if(b.dataset.dir==="up") container.scrollTop-=s;
    if(b.dataset.dir==="down") container.scrollTop+=s;
    if(b.dataset.dir==="left") container.scrollLeft-=s;
    if(b.dataset.dir==="right") container.scrollLeft+=s;
  };
});

/* START */
init(W,H);
loadCanvas();
rebuildPalette();
</script>

</body>
</html>

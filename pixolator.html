<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  color: #eee;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* TOP BAR */
#top {
  height: 44px;
  background: #222;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px;
}

button {
  background: #333;
  color: #eee;
  border: 1px solid #555;
  padding: 6px;
}

/* TOOLBOX */
#tools {
  position: fixed;
  left: 8px;
  top: 60px;
  background: #222;
  border: 1px solid #555;
  border-radius: 10px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}

button.active {
  background: #666;
}

/* CANVAS */
#canvasContainer {
  position: absolute;
  top: 44px;
  bottom: 60px;
  left: 0;
  right: 0;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  image-rendering: pixelated;
  touch-action: none;
}

/* PALETTE */
#palette {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.color {
  width: 32px;
  height: 32px;
  border: 2px solid #000;
}

.color.active {
  border-color: #fff;
}
</style>
</head>

<body>

<div id="top">
  <button id="new">New</button>
  <button id="import">Import</button>
  <button id="undo">Undo</button>
  <button id="redo">Redo</button>
  <button id="export">Export</button>
</div>

<div id="tools">
  <button data-tool="pencil" class="active">✏️</button>
  <button data-tool="line">📏</button>
  <button data-tool="fill">🪣</button>
  <button id="mirrorX">↔️</button>
  <button id="mirrorY">↕️</button>
  <button id="zoomIn">＋</button>
  <button id="zoomOut">－</button>
</div>

<div id="canvasContainer">
  <canvas id="canvas"></canvas>
</div>

<div id="palette"></div>

<script>
/* ===== CORE ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W = 16, H = 16;
let pixelSize = 24;
let bgColor = "#ffffff";

let pixels = new Array(W*H).fill("#ffffff");
let currentColor = "#000000";

let tool = "pencil";
let mirrorX = false, mirrorY = false;

let undoStack=[], redoStack=[], stroke=null;
let drawing=false, start=null;

/* ===== INIT ===== */
function resize() {
  canvas.width = W * pixelSize;
  canvas.height = H * pixelSize;
  render();
}

/* ===== RENDER ===== */
function render(preview=null){
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<H;y++)
    for(let x=0;x<W;x++){
      ctx.fillStyle=pixels[y*W+x];
      ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
    }

  if(preview) preview();
}

/* ===== DRAW LOGIC ===== */
function canDraw(x,y){
  if(mirrorX && x>=Math.floor(W/2)) return false;
  if(mirrorY && y>=Math.floor(H/2)) return false;
  return true;
}

function applyPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  if(!canDraw(x,y)) return;
  const i=y*W+x;
  if(pixels[i]===currentColor) return;

  stroke.set(i,pixels[i]);
  pixels[i]=currentColor;

  if(mirrorX) pixels[y*W+(W-1-x)]=currentColor;
  if(mirrorY) pixels[(H-1-y)*W+x]=currentColor;
  if(mirrorX&&mirrorY)
    pixels[(H-1-y)*W+(W-1-x)]=currentColor;
}

/* ===== FLOOD FILL ===== */
function floodFill(x,y,target){
  if(target===currentColor) return;
  const stack=[[x,y]];
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cy<0||cx>=W||cy>=H) continue;
    const i=cy*W+cx;
    if(pixels[i]!==target) continue;
    applyPixel(cx,cy);
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
}

/* ===== INPUT ===== */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

canvas.onpointerdown=e=>{
  drawing=true;
  stroke=new Map();
  start=pos(e);

  if(tool==="pencil") applyPixel(start.x,start.y);
  if(tool==="fill") floodFill(start.x,start.y,pixels[start.y*W+start.x]);
  render();
};

canvas.onpointermove=e=>{
  if(!drawing) return;
  const p=pos(e);
  if(tool==="pencil") applyPixel(p.x,p.y);
  if(tool==="line"){
    render(()=>drawLine(start,p,true));
  } else render();
};

window.onpointerup=e=>{
  if(!drawing) return;
  drawing=false;
  if(tool==="line"){
    drawLine(start,pos(e));
  }
  if(stroke.size){
    undoStack.push(stroke);
    redoStack.length=0;
  }
  render();
};

/* ===== LINE ===== */
function drawLine(a,b,preview=false){
  let x0=a.x,y0=a.y,x1=b.x,y1=b.y;
  let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy;
  while(true){
    preview?ctx.fillRect(x0*pixelSize,y0*pixelSize,pixelSize,pixelSize)
           :applyPixel(x0,y0);
    if(x0===x1&&y0===y1)break;
    let e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx;}
    if(e2<dx){err+=dx;y0+=sy;}
  }
}

/* ===== UI ===== */
document.querySelectorAll("#tools button[data-tool]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("#tools button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    tool=b.dataset.tool;
  };
});

mirrorX.onclick=()=>mirrorX.classList.toggle("active",mirrorX=!mirrorX);
mirrorY.onclick=()=>mirrorY.classList.toggle("active",mirrorY=!mirrorY);
zoomIn.onclick=()=>{pixelSize+=4;resize();};
zoomOut.onclick=()=>{pixelSize=Math.max(4,pixelSize-4);resize();};

undo.onclick=()=>{
  const s=undoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  redoStack.push(r); render();
};
redo.onclick=()=>{
  const s=redoStack.pop(); if(!s)return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  undoStack.push(r); render();
};

export.onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixolator.png";
  a.click();
};

new.onclick=()=>{
  pixels=new Array(W*H).fill("#ffffff");
  undoStack=[]; redoStack=[];
  render();
};

import.onclick=()=>{
  const i=document.createElement("input");
  i.type="file";
  i.accept="image/*";
  i.onchange=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=W;c.height=H;
      const x=c.getContext("2d");
      x.drawImage(img,0,0,W,H);
      const d=x.getImageData(0,0,W,H).data;
      for(let i=0;i<pixels.length;i++){
        pixels[i]=`rgb(${d[i*4]},${d[i*4+1]},${d[i*4+2]})`;
      }
      render();
    };
    img.src=URL.createObjectURL(e.target.files[0]);
  };
  i.click();
};

/* ===== PALETTE ===== */
const palette=document.getElementById("palette");
["#000","#fff","#f00","#0f0","#00f","#ff0","#f0f","#0ff"].forEach((c,i)=>{
  const d=document.createElement("div");
  d.className="color";
  d.style.background=c;
  if(i===0)d.classList.add("active");
  d.onclick=()=>{
    document.querySelectorAll(".color").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    currentColor=c;
  };
  palette.appendChild(d);
});

/* START */
resize();
render();
</script>
</body>
</html>

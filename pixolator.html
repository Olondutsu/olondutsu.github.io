<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pix-o-lator</title>

<style>
body{
  margin:0;
  background:#111;
  color:#eee;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#top{
  display:flex;
  gap:6px;
  padding:6px;
  background:#222;
  flex-wrap:wrap;
  align-items:center;
}

input,button{
  background:#333;
  color:#eee;
  border:1px solid #555;
  padding:6px;
}

button.active{background:#666;}

#canvasContainer{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:auto;
  background:#000;
}

canvas{
  image-rendering:pixelated;
  touch-action:none;
  background:#fff;
}

#palette{
  display:flex;
  gap:6px;
  padding:6px;
  background:#222;
  justify-content:center;
  flex-wrap:wrap;
}

.color{
  width:28px;
  height:28px;
  border:2px solid #000;
}

.color.active{border-color:#fff;}
</style>
</head>

<body>

<div id="top">
  W <input id="w" type="number" value="16" min="1" max="128">
  H <input id="h" type="number" value="16" min="1" max="128">
  <button id="new">New</button>
  <button id="import">Import</button>
  <button id="export">Export</button>
  <button id="grid">Grid</button>
  <button id="undo">Undo</button>
  <button id="redo">Redo</button>
</div>

<div id="canvasContainer">
  <canvas id="canvas"></canvas>
</div>

<div id="palette"></div>

<input type="file" id="file" accept="image/*" hidden>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled=false;

let W=16,H=16,pixelSize=24;
let pixels=[];
let drawing=false;
let currentColor="#000000";
let undoStack=[],redoStack=[],stroke=null;

let gridMode=0; // 0 off, 1 lines, 2 lines+numbers

let paletteColors=["#000000","#ffffff","#ff0000","#00ff00","#0000ff"];

function init(w,h){
  W=w;H=h;
  pixels=new Array(W*H).fill("#ffffff");
  undoStack=[];redoStack=[];
  resize();
}

function resize(){
  canvas.width=W*pixelSize;
  canvas.height=H*pixelSize;
  render();
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      ctx.fillStyle=pixels[y*W+x];
      ctx.fillRect(x*pixelSize,y*pixelSize,pixelSize,pixelSize);
    }
  }
  if(gridMode>0) drawGrid();
}

function drawGrid(){
  ctx.strokeStyle="#444";
  ctx.lineWidth=1;
  for(let x=0;x<=W;x++){
    ctx.beginPath();
    ctx.moveTo(x*pixelSize,0);
    ctx.lineTo(x*pixelSize,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<=H;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*pixelSize);
    ctx.lineTo(canvas.width,y*pixelSize);
    ctx.stroke();
  }
  if(gridMode===2){
    ctx.fillStyle="#888";
    ctx.font="10px monospace";
    for(let x=0;x<W;x++)
      ctx.fillText(x+1,x*pixelSize+2,10);
    for(let y=0;y<H;y++)
      ctx.fillText(y+1,2,y*pixelSize+10);
  }
}

function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:Math.floor((e.clientX-r.left)/pixelSize),
    y:Math.floor((e.clientY-r.top)/pixelSize)
  };
}

function drawPixel(x,y){
  if(x<0||y<0||x>=W||y>=H) return;
  const i=y*W+x;
  if(pixels[i]===currentColor) return;
  stroke.set(i,pixels[i]);
  pixels[i]=currentColor;
}

canvas.onpointerdown=e=>{
  drawing=true;
  stroke=new Map();
  const p=pos(e);
  drawPixel(p.x,p.y);
  render();
};

canvas.onpointermove=e=>{
  if(!drawing) return;
  const p=pos(e);
  drawPixel(p.x,p.y);
  render();
};

window.onpointerup=()=>{
  if(!drawing) return;
  drawing=false;
  if(stroke.size){
    undoStack.push(stroke);
    redoStack=[];
  }
};

undo.onclick=()=>{
  const s=undoStack.pop();
  if(!s) return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  redoStack.push(r);
  render();
};

redo.onclick=()=>{
  const s=redoStack.pop();
  if(!s) return;
  const r=new Map();
  s.forEach((v,i)=>{r.set(i,pixels[i]);pixels[i]=v;});
  undoStack.push(r);
  render();
};

grid.onclick=()=>{
  gridMode=(gridMode+1)%3;
  grid.classList.toggle("active",gridMode>0);
  render();
};

new.onclick=()=>{
  init(+w.value,+h.value);
};

export.onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="pixel.png";
  a.click();
};

import.onclick=()=>file.click();
file.onchange=e=>{
  const img=new Image();
  img.onload=()=>{
    init(W,H);
    const c=document.createElement("canvas");
    c.width=W;c.height=H;
    const x=c.getContext("2d");
    x.drawImage(img,0,0,W,H);
    const d=x.getImageData(0,0,W,H).data;
    for(let i=0;i<pixels.length;i++){
      pixels[i]=`rgb(${d[i*4]},${d[i*4+1]},${d[i*4+2]})`;
    }
    render();
  };
  img.src=URL.createObjectURL(e.target.files[0]);
};

function rebuildPalette(){
  palette.innerHTML="";
  paletteColors.forEach((c,i)=>{
    const d=document.createElement("div");
    d.className="color";
    d.style.background=c;
    if(c===currentColor) d.classList.add("active");
    d.onclick=()=>{
      document.querySelectorAll(".color").forEach(x=>x.classList.remove("active"));
      d.classList.add("active");
      currentColor=c;
    };
    d.ondblclick=()=>{
      const inp=document.createElement("input");
      inp.type="color";
      inp.value=c;
      inp.oninput=e=>{
        paletteColors[i]=e.target.value;
        rebuildPalette();
      };
      inp.click();
    };
    palette.appendChild(d);
  });
  const add=document.createElement("button");
  add.textContent="+";
  add.onclick=()=>{
    paletteColors.push("#888888");
    rebuildPalette();
  };
  palette.appendChild(add);
}

init(W,H);
rebuildPalette();
</script>

</body>
</html>
